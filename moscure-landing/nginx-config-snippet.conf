# ─────────────────────────────────────────────────────────────────────────────
# NGINX CONFIG SNIPPET — Add to your server block in /etc/nginx/sites-available/moscure
# This proxies all /api/* requests from port 80 → Express server on port 3001
# ─────────────────────────────────────────────────────────────────────────────

# Add this inside your existing `server { ... }` block:

    # ── Static React build ────────────────────────────────────────────────────
    location / {
        root /var/www/moscure/dist;      # Path to your Vite build output
        index index.html;
        try_files $uri $uri/ /index.html; # SPA fallback for React Router
    }

    # ── API proxy → Express server on port 3001 ───────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

# ─────────────────────────────────────────────────────────────────────────────
